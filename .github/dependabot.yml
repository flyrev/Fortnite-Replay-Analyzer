version: 2
updates:
  # NuGet dependencies for the ASP.NET Core web application
  - package-ecosystem: "nuget"
    directory: "/app"
    schedule:
      interval: "monthly"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    groups:
      routine:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # NuGet dependencies for the CLI tool
  - package-ecosystem: "nuget"
    directory: "/cli"
    schedule:
      interval: "monthly"
      time: "06:15"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    groups:
      routine:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # npm dependencies for the React frontend
  - package-ecosystem: "npm"
    directory: "/app/ClientApp"
    schedule:
      interval: "monthly"
      time: "06:30"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    versioning-strategy: "increase-if-necessary"
    groups:
      routine:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Docker base image updates
  - package-ecosystem: "docker"
    directory: "/app"
    schedule:
      interval: "monthly"
      time: "06:45"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    groups:
      routine:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows (CodeQL etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      time: "07:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 2
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    groups:
      routine:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
