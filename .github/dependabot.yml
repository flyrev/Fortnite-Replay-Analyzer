version: 2
updates:
  # NuGet dependencies for the ASP.NET Core web application
  - package-ecosystem: "nuget"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 1
    reviewers:
      - "flyrev"
    assignees:
      - "flyrev"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    groups:
      aws-sdk:
        patterns:
          - "AWSSDK*"
      microsoft:
        patterns:
          - "Microsoft.*"

  # NuGet dependencies for the CLI tool
  - package-ecosystem: "nuget"
    directory: "/cli"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 1
    reviewers:
      - "flyrev"
    assignees:
      - "flyrev"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "nuget"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # npm dependencies for the React frontend
  - package-ecosystem: "npm"
    directory: "/app/ClientApp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 1
    reviewers:
      - "flyrev"
    assignees:
      - "flyrev"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
    versioning-strategy: "increase"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-scripts"
      react-router:
        patterns:
          - "react-router*"
      eslint:
        patterns:
          - "eslint*"
        update-types:
          - "minor"
          - "patch"
      bootstrap:
        patterns:
          - "bootstrap"
          - "reactstrap"

  # Docker base image updates
  - package-ecosystem: "docker"
    directory: "/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 1
    reviewers:
      - "flyrev"
    assignees:
      - "flyrev"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"

  # GitHub Actions workflows (CodeQL etc.)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 1
    reviewers:
      - "flyrev"
    assignees:
      - "flyrev"
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
    rebase-strategy: "auto"
    pull-request-branch-name:
      separator: "/"
