name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "README.md"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify app and CLI
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Initialize replay corpora
        run: git submodule update --init

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/ClientApp/package-lock.json

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Install frontend dependencies
        working-directory: app/ClientApp
        run: npm ci --include=dev

      - name: Test frontend
        working-directory: app/ClientApp
        run: npm test

      - name: Restore web app
        run: dotnet restore app/FortniteReplayAnalyzer.csproj

      - name: Restore replay regression tests
        run: dotnet restore tests/FortniteReplayAnalyzer.ReplayRegressionTests/FortniteReplayAnalyzer.ReplayRegressionTests.csproj

      - name: Test replay regression harness
        run: dotnet test tests/FortniteReplayAnalyzer.ReplayRegressionTests/FortniteReplayAnalyzer.ReplayRegressionTests.csproj --configuration Release --no-restore

      - name: Publish web app
        run: dotnet publish app/FortniteReplayAnalyzer.csproj --configuration Release --no-restore

      - name: Restore CLI
        run: dotnet restore cli/cli.csproj

      - name: Build CLI
        run: dotnet build cli/cli.csproj --configuration Release --no-restore

  docker:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build --file app/Dockerfile --tag fortnite-replay-analyzer-ci app
